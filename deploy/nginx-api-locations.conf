# Add these location blocks to /etc/nginx/sites-enabled/0xdirectping
# inside the server { listen 443 ... } block, BEFORE the catch-all location /

location /mcp {
    limit_req zone=mcp burst=5 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:4021;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    client_max_body_size 64k;
}

location /x402 {
    limit_req zone=api_write burst=3 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:4021;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 64k;
}

location /api/leaderboard {
    limit_req zone=api_read burst=10 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:4021;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 1k;
}
